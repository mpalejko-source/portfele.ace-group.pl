<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfel Klienta - ACE Group</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f1a33;
      --text: #eaf0ff;
      --line: rgba(255,255,255,.10);
      --accent: #7dd3fc;
    }
    body {
      margin: 0; padding: 24px;
      font-family: Arial, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 16px;
    }
    .clientTitle { margin: 0; font-size: 32px; font-weight: 900; color: var(--text); }
    .btnBack {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 42px; padding: 0 20px; border-radius: 12px; text-decoration: none;
      font-size: 15px; font-weight: 700; color: #f4f7ff; border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      cursor: pointer; transition: all .18s ease;
    }
    .btnBack:hover { background: rgba(255,255,255,.12); transform: translateY(-1px); }
    .loader { text-align: center; padding: 60px; font-size: 18px; color: rgba(234,240,255,.55); font-style: italic; }
  </style>
</head>
<body>

  <header class="header">
    <h1 class="clientTitle" id="clientTitle">Ładowanie danych...</h1>
    <a href="index.html" class="btnBack">← Powrót do pulpitu</a>
  </header>

  <main id="viewerContent">
    <div id="loader" class="loader">Pobieranie bazy danych raportów ACE...</div>
  </main>

  <script>
    // Konfiguracja wycinania podstron (każdy klient dostaje po 3 kolejne bloki <section class="page">)
    // Kolejność musi odpowiadać kolejności oznaczania "TAK" w kolumnie K w Excelu.
    const CLIENT_CONFIG = {
      'biofeed': { title: 'Grupa Biofeed', start: 0, count: 3 },
      'mirpasz': { title: 'Grupa Mirpasz', start: 3, count: 3 },
      'iko':     { title: 'Portfel IKO',    start: 6, count: 3 },
      'ace':     { title: 'Modelowy ACE (Wewnętrzny)', start: 9, count: 3 },
      'klient5': { title: 'Portfel - Klient 5', start: 12, count: 3 },
      'klient6': { title: 'Portfel - Klient 6', start: 15, count: 3 }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const clientKey = params.get('client');
      const config = CLIENT_CONFIG[clientKey];

      if (!config) {
        document.getElementById('clientTitle').textContent = 'Błąd';
        document.getElementById('viewerContent').innerHTML = '<div class="loader" style="color:#ff5a5a;">Nieprawidłowy identyfikator klienta portfela.</div>';
        return;
      }

      document.getElementById('clientTitle').textContent = config.title;
      document.title = `${config.title} - Widok analityczny`;

      try {
        const response = await fetch('portfele_master.html?v=' + Date.now());
        if (!response.ok) throw new Error('Brak pliku portfele_master.html. Uruchom Krok 2 w Excelu.');
        
        const htmlText = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');

        // Pobranie wszystkich sekcji stron wygenerowanych przez makro
        const allPages = doc.querySelectorAll('section.page');
        
        const container = document.getElementById('viewerContent');
        document.getElementById('loader').style.display = 'none';

        // Wycięcie zestawu stron przypisanych do wybranego kafelka
        const clientPages = Array.from(allPages).slice(config.start, config.start + config.count);

        if (clientPages.length === 0) {
          container.innerHTML = '<div class="loader" style="color:#ff5a5a;">Brak wygenerowanych danych w pliku zbiorczym dla tego klienta. Sprawdź indeksy lub uruchom generowanie HTML ponownie.</div>';
          return;
        }

        // Wstrzykiwanie wyciętych stron do dokumentu
        clientPages.forEach(page => {
          container.appendChild(page.cloneNode(true));
        });

      } catch (error) {
        document.getElementById('viewerContent').innerHTML = `<div class="loader" style="color:#ff5a5a;">Błąd krytyczny: ${error.message}</div>`;
      }
    });
  </script>
</body>
</html>
